name: CI

permissions:
  contents: read
  security-events: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  collect-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.collect.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect package list
        id: collect
        run: |
          packages=$(node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const packages = fs
            .readdirSync('packages', { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => path.join('packages', entry.name))
            .filter((dirPath) => fs.existsSync(path.join(dirPath, 'package.json')))
            .map((dirPath) => path.basename(dirPath));

          process.stdout.write(JSON.stringify(packages));
          NODE
          )

          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    env:
      BROWSER: none
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Test samples
        run: pnpm run test:samples

      - name: Build
        run: pnpm run build

  security-audit:
    runs-on: ubuntu-latest
    needs: collect-packages
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.collect-packages.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Use pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit report
        id: security_audit
        run: |
          mkdir -p security-reports

          package_dir="packages/${{ matrix.package }}"

          echo "Running security audit for $package_dir"
          pnpm --dir "$package_dir" audit --audit-level=high --json > "security-reports/${{ matrix.package }}-audit.json" || audit_failed=1

          npx -y npm-audit-sarif "security-reports/${{ matrix.package }}-audit.json" --output "security-reports/${{ matrix.package }}.sarif"

          echo "audit_failed=${audit_failed:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload security report (SARIF)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security-reports/${{ matrix.package }}.sarif
          category: pnpm-audit-${{ matrix.package }}

      - name: Fail if high vulnerabilities were found
        if: steps.security_audit.outputs.audit_failed == '1'
        run: |
          echo "High or critical vulnerabilities were detected in ${{ matrix.package }}."
          exit 1
